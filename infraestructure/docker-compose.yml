services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase-production
    ports:
      - "3000:3000"
    volumes:
      - ./metabase.db:/metabase-data/metabase.db
      # CHAVE JSON: Aponta para a sua chave local do google cloud
      - ${GCP_KEY_PATH}:/app/google-creds.json
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google-creds.json
    restart: always